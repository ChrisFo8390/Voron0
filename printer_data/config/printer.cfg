[include mainsail.cfg]
[include bedfan.cfg]
[include Macros.cfg]
[include clientvar.cfg]
[include purge.cfg]

[exclude_object]

[force_move]
enable_force_move: False

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_070012000C51313339373836-if00
restart_method: command

[mcu cartographer] 
serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_430039000550315551333620-if00
restart_method: command
is_non_critical: true

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor CM4]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor Chamber]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC4

[temperature_sensor Motor_X]
sensor_type: Generic 3950
sensor_pin: PA7

[temperature_sensor Motor_Y]
sensor_type: Generic 3950
sensor_pin: PC5

[printer]
kinematics: corexy
max_velocity: 1000
max_accel: 15000
max_z_velocity: 30
max_z_accel: 500
square_corner_velocity: 10.0

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 121.4
shaper_type_y: ei
shaper_freq_y: 119.0

#####################################################################
#      X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200  
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_min: 0
position_endstop: 150
position_max: 150
homing_speed: 125   
homing_retract_dist: 5
use_sensorless_homing: True

[tmc5160 stepper_x]
cs_pin: PE3
diag1_pin: ^!PF3
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
interpolate: True
run_current: 1.8
stealthchop_threshold: 0
driver_SGT: 1
sense_resistor: 0.075
home_current: 0.9 

[stepper_y]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200  
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: 0
position_endstop: 150
position_max: 150
homing_speed: 125
homing_retract_dist: 5
use_sensorless_homing: True

[tmc5160 stepper_y]
cs_pin: PC13
diag1_pin: ^!PF4
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
interpolate: True
run_current: 1.8
stealthchop_threshold: 0
driver_SGT: 1
sense_resistor: 0.075
home_current: 0.9

#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 64
endstop_pin: probe:z_virtual_endstop
full_steps_per_rotation: 200  
position_min: -1.5
position_max: 100
homing_speed: 60   
second_homing_speed: 2.0
homing_retract_dist: 0

[tmc2240 stepper_z]
cs_pin: PB9
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
interpolate: True
run_current: 0.4
stealthchop_threshold: 0
rref: 12000
driver_slope_control: 3

[stepper_z1]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 64
full_steps_per_rotation: 200  

[tmc2240 stepper_z1]
cs_pin: PG14
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
interpolate: True
run_current: 0.4
stealthchop_threshold: 0
rref: 12000
driver_slope_control: 3

[stepper_z2]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
rotation_distance: 40
gear_ratio: 80:16
microsteps: 64
full_steps_per_rotation: 200  

[tmc2240 stepper_z2]
cs_pin: PB5
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
interpolate: True
run_current: 0.4
stealthchop_threshold: 0
rref: 12000
driver_slope_control: 3

[stepper_z3]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 64
full_steps_per_rotation: 200  

[tmc2240 stepper_z3]
cs_pin: PG10
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
interpolate: True
run_current: 0.4
stealthchop_threshold: 0
rref: 12000
driver_slope_control: 3
                                            
#####################################################################
#   Autotune Settings
#####################################################################

[autotune_tmc stepper_x]
motor: omc-17hs19-2504s-h
voltage: 48
SGT: 1
tuning_goal: performance
extra_hysteresis: 1
[autotune_tmc stepper_y]
motor: omc-17hs19-2504s-h
voltage: 48
SGT: 1
tuning_goal: performance
extra_hysteresis: 1
[autotune_tmc stepper_z]
motor: omc-17hm19-2004s
voltage: 24
tuning_goal: silent
extra_hysteresis: 1
[autotune_tmc stepper_z1]
motor: omc-17hm19-2004s
voltage: 24
tuning_goal: silent
extra_hysteresis: 1
[autotune_tmc stepper_z2]
motor: omc-17hm19-2004s
voltage: 24
tuning_goal: silent
extra_hysteresis: 1
[autotune_tmc stepper_z3]
motor: omc-17hm19-2004s
voltage: 24
tuning_goal: silent
extra_hysteresis: 1

#####################################################################
#   Probe
#####################################################################
[cartographer]
mcu: cartographer
x_offset: 0
y_offset: 18.8 
verbose: yes 

[bed_mesh]
mesh_min: 20, 20
mesh_max: 130, 130
probe_count: 30, 30
speed: 300
horizontal_move_z: 4
zero_reference_position: 75, 75
algorithm: bicubic
#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: PD4
dir_pin: !PD3                                                     
enable_pin: !PD6
full_steps_per_rotation: 200                                         
rotation_distance: 35.4060435456  
gear_ratio: 60:8 
microsteps: 32
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0
pwm_cycle_time: 0.02506 # 39.9Hz
sensor_type: PT1000
sensor_pin: PB0
pullup_resistor: 2200
#control: pid_v
#pid_kp: 34.794
#pid_ki: 11.795
#pid_kd: 25.661
min_temp: 0
max_temp: 320
min_extrude_temp: 170
max_extrude_only_distance: 150
max_extrude_cross_section: 200
pressure_advance: 0.0                                               
pressure_advance_smooth_time: 0.040

[tmc2240 extruder]
cs_pin: PD5
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
interpolate: False
run_current: 0.6
stealthchop_threshold: 0
rref: 12000
driver_slope_control: 3

[firmware_retraction]
retract_length: 0.9
retract_speed: 45
unretract_extra_length: 0
unretract_speed: 25

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA5
sensor_type: Generic 3950
sensor_pin: PB1
smooth_time: 3.0
max_power: 1.0                                                     
min_temp: 0
max_temp: 130
pwm_cycle_time: 0.02506 # 39.9Hz
#control: pid_v
#pid_kp: 6.690
#pid_ki: 2.311
#pid_kd: 3.068

#####################################################################
# Fan Control
#####################################################################

[heater_fan hotend_fan]
pin: PA4
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
tachometer_pin: ^PC2
tachometer_ppr: 2
tachometer_poll_interval: 0.0009
 
[fan]
pin: PF8
max_power: 1.0
kick_start_time: 0.5
cycle_time: 0.010

[controller_fan Electronics]
pin:PA2
tachometer_pin: PC1
tachometer_ppr: 2
hardware_pwm: True
cycle_time: 0.00004
kick_start_time: 0.8
shutdown_speed: 1.0
max_power: 1.0
fan_speed: 1.0
cycle_time: 0.01
idle_timeout: 15
stepper: stepper_z, stepper_x, stepper_y
heater: heater_bed, extruder

[delayed_gcode setneopixel]
initial_duration: 2
gcode:
    TOOLHEAD_LED
    MR_NOTIFY TITLE="$printer_name" MESSAGE="Ready!"

#####################################################################
# Light Control
#####################################################################

[output_pin caselight]
pin: PA3
pwm:true
shutdown_value: 0
value:0.35
cycle_time: 0.002

[neopixel th_led]
pin: PD15
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 1.0

[gcode_macro TOOLHEAD_LED]
gcode: 
    SET_LED LED=th_led RED=0 GREEN=0 BLUE=0 WHITE=0.8 INDEX=2 TRANSMIT=1
    SET_LED LED=th_led RED=0 GREEN=0 BLUE=0 WHITE=0.8 INDEX=3 TRANSMIT=1

    
#####################################################################
# Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 7200

[safe_z_home]
home_y_before_x: True
home_xy_position: 75, 75
z_hop: 5
speed: 500

[quad_gantry_level]
gantry_corners:
   -60,-10
   210,220
##  Probe points
points:
   20,20
   20,130
   130,130
   130,20
speed: 600
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0055
max_adjust: 5

[adxl345]
cs_pin: cartographer:PA0
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    75, 75, 20
    
[shaketune]
# result_folder: ~/printer_data/config/ShakeTune_results
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store 
#    results in a different location.
# number_of_results_to_keep: 10
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
# keep_raw_data: False
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
# show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
# timeout: 600
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating 
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
# measurements_chunk_size: 2
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
# max_freq: 200
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
# dpi: 300
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.

