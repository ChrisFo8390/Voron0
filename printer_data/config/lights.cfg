#####################################################################
# Light Control
#####################################################################

[output_pin caselight]
pin: PA3
pwm:true
shutdown_value: 0
value:0.15
cycle_time: 0.001


[neopixel logo_led]
pin: PE9
chain_count: 8
color_order: GRB
initial_RED: 0.0
initial_GREEN: 1.0
initial_BLUE: 0.0

[neopixel th_led]
pin: NH36: gpio7
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 1.0
initial_BLUE: 0.0

[gcode_macro TOOLHEAD_LED]
gcode: 
    SET_LED LED=th_led RED=0 GREEN=0 BLUE=0 WHITE=0.8 INDEX=2 TRANSMIT=1
    SET_LED LED=th_led RED=0 GREEN=0 BLUE=0 WHITE=0.8 INDEX=3 TRANSMIT=1
